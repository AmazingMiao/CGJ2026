<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>巨石遥控器</title>
  <style>
    * { box-sizing: border-box; -webkit-user-select: none; user-select: none; -webkit-tap-highlight-color: transparent; }
    html, body {
      margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden;
      background: #EF8434;
      font-family: -apple-system, system-ui, sans-serif;
    }
    #stage {
      position: fixed; inset: 0;
      display: flex; align-items: center; justify-content: center;
    }
    /* 中央箭头图片(透明底 PNG):图默认朝上,由 JS 旋转到重力方向。 */
    #arrow {
      width: 55vmin; height: 55vmin;
      object-fit: contain;
      transform: rotate(180deg);          /* 初始朝下(重力默认向下);图默认朝上,+180 = 朝下 */
      transition: transform 80ms linear, opacity 120ms linear;
      opacity: 0.2;
      will-change: transform;
    }
    /* 点击开启层:授权 + 连接后隐藏,之后屏幕只剩橙底 + 箭头。 */
    #tap {
      position: fixed; inset: 0; z-index: 10;
      display: flex; align-items: flex-end; justify-content: center;
      padding-bottom: 14vh;
      background: rgba(0, 0, 0, 0.35);
      color: #111; font-size: 6vmin; font-weight: 800; letter-spacing: 2px;
    }
    #tap.hidden { display: none; }
  </style>
</head>
<body>
  <div id="stage">
    <img id="arrow" src="arrow.png" alt="" draggable="false" />
  </div>

  <div id="tap">点击开启</div>

  <!-- iOS Safari 无 navigator.vibrate;隐藏 switch + label 点击兜底触发 iOS 17.4+ 轻微触感。 -->
  <input type="checkbox" id="hapticSwitch" switch style="position:absolute;opacity:0;pointer-events:none;width:0;height:0;" />
  <label id="hapticLabel" for="hapticSwitch" style="position:absolute;opacity:0;pointer-events:none;width:0;height:0;"></label>

  <script>
    const $ = (id) => document.getElementById(id);
    const arrowEl = $('arrow');
    const tapEl = $('tap');

    // 与 Unity 端 BoulderGravityController 保持一致的映射;若箭头方向镜像了,翻这两个开关。
    const invertGamma = false;
    const invertBeta = false;
    const deadZoneDegrees = 10;

    let socket = null;
    let lastSent = 0;
    const sendIntervalMs = 20;   // ~50Hz

    // devicemotion 与 deviceorientation 分开触发,缓存最近一帧加速度随倾角一起发送。
    let accG = { x: 0, y: 0, z: 0 };   // 含重力
    let accL = { x: 0, y: 0, z: 0 };   // 去重力(线性)

    function connect() {
      const url = `wss://${location.host}/ws`;
      socket = new WebSocket(url);
      socket.onopen = () => tapEl.classList.add('hidden');
      socket.onclose = () => { tapEl.classList.remove('hidden'); tapEl.textContent = '已断开 · 点击重连'; setTimeout(connect, 3000); };
      socket.onerror = () => { tapEl.classList.remove('hidden'); tapEl.textContent = '连接错误 · 点击重试'; };
      socket.onmessage = (ev) => onServerMessage(ev.data);
    }

    // Mac → 手机 回传:目前只处理震动。
    function onServerMessage(raw) {
      let msg;
      try { msg = JSON.parse(raw); } catch (e) { return; }
      if (msg && msg.type === 'vibrate') { vibrate(msg.ms || 200); }
    }

    function vibrate(ms) {
      if (typeof navigator.vibrate === 'function') { navigator.vibrate(ms); }
      const label = $('hapticLabel');
      if (label) { try { label.click(); } catch (e) {} }
    }

    function onMotion(e) {
      const g = e.accelerationIncludingGravity;
      if (g) { accG = { x: g.x || 0, y: g.y || 0, z: g.z || 0 }; }
      const a = e.acceleration;
      if (a && (a.x !== null || a.y !== null || a.z !== null)) {
        accL = { x: a.x || 0, y: a.y || 0, z: a.z || 0 };
      }
    }

    // 用与巨石完全相同的公式把倾角换算成重力方向,再旋转箭头。
    function updateArrow(beta, gamma) {
      const rad = Math.PI / 180;
      const g = invertGamma ? -gamma : gamma;
      const b = invertBeta ? -beta : beta;

      const gx = Math.abs(g) < deadZoneDegrees ? 0 : Math.sin(g * rad) * Math.cos(b * rad);
      const gy = Math.abs(b) < deadZoneDegrees ? 0 : Math.sin(b * rad);

      const mag = Math.hypot(gx, gy);
      if (mag < 1e-3) {
        // 无重力(两轴都在死区):箭头淡出。
        arrowEl.style.opacity = '0.2';
        return;
      }

      arrowEl.style.opacity = '1';
      // atan2 的 0° 指向右;箭头图默认朝上,故 +90° 换算基准。gy 向下为正以匹配真机手感。
      const deg = Math.atan2(gy, gx) * 180 / Math.PI + 90;
      arrowEl.style.transform = `rotate(${deg}deg)`;
    }

    function onOrientation(e) {
      const beta = e.beta || 0;
      const gamma = e.gamma || 0;
      const alpha = e.alpha || 0;

      updateArrow(beta, gamma);

      const now = performance.now();
      if (now - lastSent < sendIntervalMs) return;
      lastSent = now;

      if (socket && socket.readyState === WebSocket.OPEN) {
        socket.send(JSON.stringify({
          Beta: beta, Gamma: gamma, Alpha: alpha,
          AccelX: accG.x, AccelY: accG.y, AccelZ: accG.z,
          LinAccelX: accL.x, LinAccelY: accL.y, LinAccelZ: accL.z
        }));
      }
    }

    async function enable() {
      try {
        // iOS 13+ 必须在用户手势里请求权限。
        if (typeof DeviceOrientationEvent !== 'undefined' &&
            typeof DeviceOrientationEvent.requestPermission === 'function') {
          const res = await DeviceOrientationEvent.requestPermission();
          if (res !== 'granted') { tapEl.textContent = '陀螺仪被拒 · 点击重试'; return; }
        }
        window.addEventListener('deviceorientation', onOrientation, true);

        // 加速度计:iOS 需单独申请 DeviceMotionEvent 权限。
        if (typeof DeviceMotionEvent !== 'undefined' &&
            typeof DeviceMotionEvent.requestPermission === 'function') {
          try {
            const mres = await DeviceMotionEvent.requestPermission();
            if (mres === 'granted') { window.addEventListener('devicemotion', onMotion, true); }
          } catch (e) { /* 陀螺仪仍可用 */ }
        } else {
          window.addEventListener('devicemotion', onMotion, true);
        }

        connect();
      } catch (err) {
        tapEl.textContent = '授权异常 · 点击重试';
      }
    }

    // 整个提示层都可点,免去单独按钮。
    tapEl.addEventListener('click', enable);
  </script>
</body>
</html>
